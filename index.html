<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Il Ricettario</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Work+Sans:wght@400;500;600;700&display=swap');

:root{
  --paper: #FAF6EE;
  --card: #F4EEE0;
  --ink: #2E2A22;
  --ink-soft: #6B6354;
  --line: #E1D6BE;
  --primary: #4F6B4A;
  --primary-dark: #3C5238;
  --primary-tint: #E7EEE3;

  --cat-antipasti: #7C9473;
  --cat-primi: #C1663D;
  --cat-secondi: #A24B42;
  --cat-dolci: #BF9327;

  --font-display: 'Lora', serif;
  --font-body: 'Work Sans', sans-serif;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background: var(--paper);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(46,42,34,0.05) 1px, transparent 0);
  background-size: 22px 22px;
  color: var(--ink);
  font-family: var(--font-body);
  min-height: 100vh;
}

#app{ max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

/* ---------- Header ---------- */
.hero{
  display:flex; align-items:flex-end; justify-content:space-between; gap:24px;
  margin-bottom: 34px; flex-wrap:wrap;
  border-bottom: 1px solid var(--line);
  padding-bottom: 22px;
}
.hero h1{
  font-family:var(--font-display); font-weight:700; font-size:2.6rem;
  margin:0; letter-spacing:-0.01em; color: var(--ink);
}
.hero p{
  margin:6px 0 0; color:var(--ink-soft); font-size:0.98rem; max-width:420px;
}
.count-badge{
  font-family:var(--font-body); font-size:0.78rem; letter-spacing:0.08em;
  text-transform:uppercase; color:var(--ink-soft);
  border:1px solid var(--line); border-radius:20px; padding:6px 14px;
  white-space:nowrap;
}

/* ---------- Toolbar ---------- */
.toolbar{
  display:flex; flex-wrap:wrap; gap:14px; align-items:center;
  margin-bottom: 28px;
}
.search-wrap{
  position:relative; flex: 1 1 280px; min-width:240px;
}
.search-wrap svg{
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  width:16px; height:16px; stroke:var(--ink-soft); pointer-events:none;
}
#search{
  width:100%; padding:12px 14px 12px 40px; border-radius:10px;
  border:1px solid var(--line); background:#fff; font-family:var(--font-body);
  font-size:0.95rem; color:var(--ink); outline:none;
  transition: border-color .15s, box-shadow .15s;
}
#search:focus{ border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-tint); }
#search::placeholder{ color:#B4A98F; }

.chips{ display:flex; gap:8px; flex-wrap:wrap; }
.chip{
  font-family:var(--font-body); font-weight:600; font-size:0.82rem;
  padding:9px 16px; border-radius:20px; border:1px solid var(--line);
  background:#fff; color:var(--ink-soft); cursor:pointer;
  transition: all .15s;
}
.chip:hover{ border-color:var(--primary); color:var(--ink); }
.chip.active{
  background:var(--primary); border-color:var(--primary); color:#fff;
}

.btn-add{
  margin-left:auto;
  font-family:var(--font-body); font-weight:600; font-size:0.9rem;
  background:var(--primary); color:#fff; border:none; border-radius:10px;
  padding:12px 20px; cursor:pointer; white-space:nowrap;
  transition: background .15s, transform .1s;
  display:flex; align-items:center; gap:8px;
}
.btn-add:hover{ background:var(--primary-dark); }
.btn-add:active{ transform: scale(0.98); }

.btn-shopping{
  position:relative;
  font-family:var(--font-body); font-weight:600; font-size:0.9rem;
  background:#fff; color:var(--ink); border:1px solid var(--line); border-radius:10px;
  padding:12px 18px; cursor:pointer; white-space:nowrap;
  display:flex; align-items:center; gap:8px;
}
.btn-shopping:hover{ border-color:var(--primary); }
.shopping-badge{
  background:var(--primary); color:#fff; font-size:0.68rem; font-weight:700;
  border-radius:10px; padding:1px 7px; line-height:1.4;
}
.shopping-badge.hidden{ display:none; }

/* ---------- Grid & Cards ---------- */
#grid{
  display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 28px 22px;
}

.card-wrap{ position:relative; padding-top:16px; }
.tab{
  position:absolute; top:0; left:18px; z-index:2;
  font-family:var(--font-body); font-weight:700; font-size:0.65rem;
  letter-spacing:0.09em; text-transform:uppercase; color:#fff;
  padding:5px 12px 4px; border-radius:6px 6px 0 0;
}
.card{
  background: var(--card);
  border:1px solid var(--line);
  border-radius: 4px 10px 10px 10px;
  padding: 20px 18px 18px;
  cursor:pointer;
  box-shadow: 0 1px 0 rgba(46,42,34,0.04);
  transition: transform .15s, box-shadow .15s;
  height:100%;
  display:flex; flex-direction:column;
  overflow:hidden;
}
.card:hover{
  transform: translateY(-3px) rotate(-0.3deg);
  box-shadow: 0 10px 22px rgba(46,42,34,0.12);
}
.card h3{
  font-family:var(--font-display); font-size:1.28rem; font-weight:600;
  margin:2px 0 8px; color:var(--ink); line-height:1.25;
}
.card .meta{
  font-size:0.78rem; color:var(--ink-soft); margin-bottom:12px;
  display:flex; gap:12px;
}
.card .ingredients-preview{
  font-size:0.86rem; color:var(--ink-soft); line-height:1.5;
  border-top:1px dashed var(--line); padding-top:10px; margin-top:auto;
}
.card .ingredients-preview b{ color:var(--ink); font-weight:600; }
.card-photo{
  width:calc(100% + 36px); margin:-20px -18px 12px; height:130px;
  object-fit:cover; display:block;
  border-bottom:1px solid var(--line);
}

/* ---------- Empty state ---------- */
.empty{
  grid-column: 1 / -1;
  text-align:center; padding: 70px 20px;
  border:1px dashed var(--line); border-radius:14px;
  color:var(--ink-soft);
}
.empty h3{ font-family:var(--font-display); color:var(--ink); font-size:1.4rem; margin-bottom:8px;}
.empty button{
  margin-top:18px; background:var(--primary); color:#fff; border:none;
  padding:11px 20px; border-radius:10px; font-family:var(--font-body);
  font-weight:600; cursor:pointer; font-size:0.9rem;
}

/* ---------- Modal ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(46,42,34,0.45);
  display:flex; align-items:flex-start; justify-content:center;
  padding: 5vh 20px; overflow-y:auto; z-index:50;
  opacity:0; pointer-events:none; transition:opacity .18s;
}
.overlay.open{ opacity:1; pointer-events:auto; }
.modal{
  background:var(--paper); border-radius:16px; max-width:640px; width:100%;
  padding: 32px 32px 28px; position:relative;
  box-shadow: 0 24px 60px rgba(0,0,0,0.25);
  transform: translateY(-8px); transition: transform .18s;
}
.overlay.open .modal{ transform: translateY(0); }
.modal-close{
  position:absolute; top:18px; right:18px; background:none; border:none;
  cursor:pointer; color:var(--ink-soft); width:32px; height:32px;
  border-radius:8px; display:flex; align-items:center; justify-content:center;
}
.modal-close:hover{ background:var(--line); color:var(--ink); }

.modal h2{
  font-family:var(--font-display); font-size:1.7rem; margin:0 18px 20px 0;
  padding-right:20px;
}
.field{ margin-bottom:16px; }
.field label{
  display:block; font-size:0.78rem; font-weight:600; letter-spacing:0.05em;
  text-transform:uppercase; color:var(--ink-soft); margin-bottom:6px;
}
.field input, .field select, .field textarea{
  width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--line);
  font-family:var(--font-body); font-size:0.94rem; color:var(--ink);
  background:#fff; outline:none; resize:vertical;
}
.field input:focus, .field select:focus, .field textarea:focus{
  border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-tint);
}
.field small{ color:var(--ink-soft); font-size:0.76rem; }
.row2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }

.cat-select{ display:flex; gap:8px; flex-wrap:wrap; }
.cat-opt{
  flex:1; min-width:100px; text-align:center; padding:10px 8px; border-radius:9px;
  border:1.5px solid var(--line); cursor:pointer; font-size:0.82rem; font-weight:600;
  color:var(--ink-soft); background:#fff; transition:all .12s;
}
.cat-opt.selected{ color:#fff; }

.modal-actions{
  display:flex; justify-content:flex-end; gap:10px; margin-top:22px;
  padding-top:18px; border-top:1px solid var(--line);
}
.btn-secondary{
  background:none; border:1px solid var(--line); color:var(--ink-soft);
  padding:10px 18px; border-radius:9px; font-family:var(--font-body);
  font-weight:600; cursor:pointer; font-size:0.88rem;
}
.btn-primary{
  background:var(--primary); border:none; color:#fff;
  padding:10px 20px; border-radius:9px; font-family:var(--font-body);
  font-weight:600; cursor:pointer; font-size:0.88rem;
}
.btn-primary:hover{ background:var(--primary-dark); }
.btn-danger{
  background:none; border:1px solid #C1663D; color:#C1663D;
  padding:10px 16px; border-radius:9px; font-family:var(--font-body);
  font-weight:600; cursor:pointer; font-size:0.88rem; margin-right:auto;
}
.btn-icon{
  display:inline-flex; align-items:center; gap:6px;
  background:none; border:1px solid var(--line); color:var(--ink-soft);
  font-family:var(--font-body); font-weight:600; font-size:0.88rem;
  padding:10px 16px; border-radius:9px; cursor:pointer;
}
.btn-icon:hover{ border-color:var(--primary); color:var(--ink); }
.btn-icon svg{ width:16px; height:16px; }

@media print{
  body *{ visibility:hidden; }
  .overlay{ position:static; padding:0; background:none; opacity:1; pointer-events:auto; }
  .modal, .modal *{ visibility:visible; }
  .modal{
    position:absolute; top:0; left:0; width:100%; max-width:100%;
    box-shadow:none; transform:none; padding:0;
  }
  .modal-close, .modal-actions, .gdrive-box, .toolbar, header, .count-badge{ display:none !important; }
}

/* Detail view */
.detail-badge{
  display:inline-block; font-size:0.68rem; font-weight:700; letter-spacing:0.08em;
  text-transform:uppercase; color:#fff; padding:4px 12px; border-radius:20px;
  margin-bottom:12px;
}
.detail-meta{ display:flex; gap:18px; color:var(--ink-soft); font-size:0.85rem; margin-bottom:20px; }
.detail-section h4{
  font-family:var(--font-body); font-size:0.78rem; font-weight:700; letter-spacing:0.07em;
  text-transform:uppercase; color:var(--ink-soft); margin:20px 0 10px;
}
.detail-section ul{ margin:0; padding-left:20px; color:var(--ink); }
.detail-section ul li{ margin-bottom:6px; line-height:1.45; }
.detail-section ol{ margin:0; padding-left:20px; color:var(--ink); }
.detail-section ol li{ margin-bottom:10px; line-height:1.5; }
.detail-notes{ color:var(--ink-soft); font-style:italic; font-size:0.9rem; line-height:1.5; }

.detail-photo{
  width:100%; max-height:280px; object-fit:cover; border-radius:10px;
  margin-bottom:18px; border:1px solid var(--line); display:block;
}

/* Upload immagine nel form */
.image-upload{
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
}
.image-preview{
  width:96px; height:96px; border-radius:10px; object-fit:cover;
  border:1px solid var(--line); background:#fff; display:none;
}
.image-preview.show{ display:block; }
.image-upload-actions{ display:flex; flex-direction:column; gap:8px; }
.btn-file{
  font-family:var(--font-body); font-weight:600; font-size:0.85rem;
  background:#fff; color:var(--ink); border:1px solid var(--line); border-radius:8px;
  padding:8px 14px; cursor:pointer; white-space:nowrap; display:inline-block;
}
.btn-file:hover{ border-color:var(--primary); }
.btn-file input{ display:none; }
.btn-remove-photo{
  font-family:var(--font-body); font-weight:600; font-size:0.8rem;
  background:none; color:var(--cat-secondi); border:none; cursor:pointer;
  text-decoration:underline; padding:0; text-align:left; display:none;
}
.btn-remove-photo.show{ display:inline-block; }

mark{ background: #F0DDA6; color:inherit; border-radius:2px; padding:0 1px; }

.loading-msg{ text-align:center; padding:60px; color:var(--ink-soft); grid-column:1/-1; }

@media (max-width:560px){
  .hero h1{ font-size:2rem; }
  .row2{ grid-template-columns:1fr; }
  .btn-add{ margin-left:0; width:100%; justify-content:center; }
}

/* ---------- Lista della spesa ---------- */
.shopping-add-row{
  display:flex; gap:10px; margin-bottom:16px;
}
.shopping-add-row input{
  flex:1; padding:10px 12px; border-radius:9px; border:1px solid var(--line);
  font-family:var(--font-body); font-size:0.94rem; color:var(--ink); outline:none;
}
.shopping-add-row input:focus{ border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-tint); }

.shopping-from-recipe{ margin-bottom:18px; }
.shopping-from-recipe select{
  width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--line);
  font-family:var(--font-body); font-size:0.9rem; color:var(--ink); background:#fff;
}

.shopping-list{ list-style:none; margin:0 0 6px; padding:0; max-height:360px; overflow-y:auto; }
.shopping-list li{
  display:flex; align-items:center; gap:10px; padding:9px 2px;
  border-bottom:1px solid var(--line); font-size:0.94rem;
}
.shopping-list li input[type="checkbox"]{ width:18px; height:18px; accent-color:var(--primary); flex:none; }
.shopping-list li span{ flex:1; }
.shopping-list li.checked span{ color:var(--ink-soft); text-decoration:line-through; }
.shopping-list .del-item{
  background:none; border:none; cursor:pointer; color:var(--ink-soft); flex:none;
  display:flex; align-items:center; justify-content:center; padding:4px;
}
.shopping-list .del-item:hover{ color:var(--cat-secondi); }
.shopping-empty{ color:var(--ink-soft); text-align:center; padding:24px 0; font-size:0.9rem; }
/* ---------- Google Drive sync ---------- */
.gdrive-box{
  display:flex; align-items:center; gap:10px;
  border:1px solid var(--line); background:#fff; border-radius:10px;
  padding:9px 14px; font-size:0.85rem; color:var(--ink-soft);
}
.gdrive-box svg{ width:16px; height:16px; flex:none; }
.btn-gdrive{
  font-family:var(--font-body); font-weight:600; font-size:0.85rem;
  background:#fff; color:var(--ink); border:1px solid var(--line); border-radius:8px;
  padding:7px 12px; cursor:pointer; white-space:nowrap;
}
.btn-gdrive:hover{ border-color:var(--primary); }
.gdrive-status{ font-size:0.8rem; }
.gdrive-status.ok{ color:var(--primary-dark); }
.gdrive-status.err{ color:var(--cat-secondi); }

/* ---------- Valutazione a stelle ---------- */
.rating{ display:inline-flex; gap:2px; margin-bottom:10px; }
.rating svg{ width:14px; height:14px; }
.rating-interactive{ display:inline-flex; gap:5px; margin-bottom:18px; }
.rating-interactive span{ cursor:pointer; line-height:0; transition:transform .1s; }
.rating-interactive span:hover{ transform:scale(1.18); }
.rating-interactive svg{ width:23px; height:23px; }
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div id="app">
  <div class="hero">
    <div>
      <h1>Il Ricettario</h1>
      <p>La tua raccolta di ricette, sempre a portata di mano.</p>
    </div>
    <div class="count-badge" id="countBadge">0 ricette</div>
  </div>

  <div class="gdrive-box" id="gdriveBox" style="margin-bottom:18px;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 3 20h18L12 2Z"/></svg>
    <span class="gdrive-status" id="gdriveStatus">Non connesso a Google Drive</span>
    <button class="btn-gdrive" id="btnGdrive">Accedi con Google</button>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Cerca per nome o ingrediente…" autocomplete="off">
    </div>
    <div class="chips" id="chips"></div>
    <button class="btn-shopping" id="btnShopping">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Lista della spesa
      <span class="shopping-badge hidden" id="shoppingBadge">0</span>
    </button>
    <button class="btn-add" id="btnAdd">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Nuova ricetta
    </button>
  </div>

  <div id="grid"><div class="loading-msg">Caricamento del ricettario…</div></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
const CATS = [
  { key:'antipasti', label:'Antipasti', color:'var(--cat-antipasti)' },
  { key:'primi', label:'Primi', color:'var(--cat-primi)' },
  { key:'secondi', label:'Secondi', color:'var(--cat-secondi)' },
  { key:'dolci', label:'Dolci', color:'var(--cat-dolci)' },
];
const catMap = Object.fromEntries(CATS.map(c=>[c.key,c]));

let recipes = [];
let shoppingList = [];
let activeCat = 'tutte';
let searchTerm = '';
let editingId = null;

const grid = document.getElementById('grid');
const chipsEl = document.getElementById('chips');
const countBadge = document.getElementById('countBadge');
const overlay = document.getElementById('overlay');
const modalContent = document.getElementById('modalContent');

function uid(){ return 'r' + Date.now() + Math.random().toString(36).slice(2,7); }

function compressImage(file, maxSize=900, quality=0.72){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Lettura file fallita'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Immagine non valida'));
      img.onload = () => {
        let { width, height } = img;
        if(width > maxSize || height > maxSize){
          if(width >= height){
            height = Math.round(height * (maxSize / width));
            width = maxSize;
          } else {
            width = Math.round(width * (maxSize / height));
            height = maxSize;
          }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function normalize(s){
  return (s||'').toString().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

function applyStoredData(parsed){
  if(Array.isArray(parsed)){
    // Formato precedente: solo l'elenco ricette
    recipes = parsed;
  } else if(parsed && typeof parsed === 'object'){
    recipes = Array.isArray(parsed.recipes) ? parsed.recipes : [];
    shoppingList = Array.isArray(parsed.shoppingList) ? parsed.shoppingList : [];
  } else {
    recipes = [];
    shoppingList = [];
  }
  // Compatibilità con ricette salvate prima dell'introduzione della valutazione
  recipes = recipes.map(r => ({ rating: 0, ...r }));
}

function starIcon(filled){
  return filled
    ? `<svg viewBox="0 0 24 24" fill="#C9A227" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
}

function renderStarsReadonly(rating){
  if(!rating) return '';
  let html = '<div class="rating">';
  for(let i=1;i<=5;i++) html += starIcon(i<=rating);
  html += '</div>';
  return html;
}

async function loadRecipes(){
  try{
    const raw = localStorage.getItem('ricette-list');
    applyStoredData(raw ? JSON.parse(raw) : null);
  }catch(e){
    console.error('Errore nel caricamento', e);
    recipes = [];
    shoppingList = [];
  }
  render();
  renderShoppingBadge();
}

async function saveRecipes(){
  try{
    localStorage.setItem('ricette-list', JSON.stringify({ recipes, shoppingList }));
  }catch(e){
    console.error('Errore nel salvataggio', e);
    alert('Impossibile salvare: spazio di archiviazione del browser esaurito o non disponibile.');
  }
  renderShoppingBadge();
  queueDriveSync();
}

/* ================= Google Drive sync =================
   Config: sostituisci con il Client ID creato su Google Cloud Console
   (vedi istruzioni fornite). Nessun client secret richiesto: qui usiamo
   solo il flusso OAuth lato browser (Google Identity Services). */
const GOOGLE_CLIENT_ID = '1037611563563-89sd7m80smh7bc6l9722peajcmt4l5ad.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const DRIVE_FILENAME = 'ricette-list.json';

let gAccessToken = null;
let gDriveFileId = null;
let gTokenClient = null;
let driveSyncTimer = null;
let gTokenRefreshTimer = null;
let gHasSyncedOnce = false;

const gdriveStatus = document.getElementById('gdriveStatus');
const btnGdrive = document.getElementById('btnGdrive');

function setGdriveStatus(text, cls){
  gdriveStatus.textContent = text;
  gdriveStatus.className = 'gdrive-status' + (cls ? ' ' + cls : '');
}

function scheduleTokenRefresh(expiresInSeconds){
  clearTimeout(gTokenRefreshTimer);
  const seconds = (typeof expiresInSeconds === 'number' && expiresInSeconds > 0) ? expiresInSeconds : 3600;
  // Rinnova il token 5 minuti prima della scadenza, così la sincronizzazione
  // non si interrompe mai durante l'uso dell'app.
  const refreshInMs = Math.max((seconds - 300) * 1000, 30000);
  gTokenRefreshTimer = setTimeout(()=>{
    if(gTokenClient){
      gTokenClient.requestAccessToken({ prompt: '' });
    }
  }, refreshInMs);
}

function silentTokenRefresh(){
  return new Promise((resolve, reject)=>{
    if(typeof google === 'undefined' || !google.accounts){
      reject(new Error('Libreria Google non disponibile'));
      return;
    }
    // Client dedicato al rinnovo silenzioso, per non interferire con il
    // flusso di accesso principale gestito da initGoogleAuth.
    const refreshClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: DRIVE_SCOPE,
      callback: (resp)=>{
        if(resp.error){ reject(new Error(resp.error)); return; }
        gAccessToken = resp.access_token;
        scheduleTokenRefresh(resp.expires_in);
        resolve(resp.access_token);
      },
    });
    refreshClient.requestAccessToken({ prompt: '' });
  });
}

function initGoogleAuth(){
  if(typeof google === 'undefined' || !google.accounts){
    setGdriveStatus('Libreria Google non caricata', 'err');
    return;
  }
  gTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: async (resp)=>{
      if(resp.error){
        setGdriveStatus('Accesso negato o annullato', 'err');
        return;
      }
      gAccessToken = resp.access_token;
      scheduleTokenRefresh(resp.expires_in);
      localStorage.setItem('gdrive-was-signed-in', '1');
      btnGdrive.textContent = 'Disconnetti';
      if(!gHasSyncedOnce){
        gHasSyncedOnce = true;
        setGdriveStatus('Connessione a Drive…');
        await driveInitialSync();
      } else {
        // Rinnovo silenzioso del token: non serve rifare la sincronizzazione iniziale
        setGdriveStatus('Sincronizzato con Google Drive', 'ok');
      }
    },
  });

  btnGdrive.addEventListener('click', ()=>{
    if(gAccessToken){
      // Disconnetti (solo lato app: revoca il token corrente)
      google.accounts.oauth2.revoke(gAccessToken, ()=>{});
      clearTimeout(gTokenRefreshTimer);
      gAccessToken = null;
      gDriveFileId = null;
      gHasSyncedOnce = false;
      localStorage.removeItem('gdrive-was-signed-in');
      btnGdrive.textContent = 'Accedi con Google';
      setGdriveStatus('Non connesso a Google Drive');
    } else {
      gTokenClient.requestAccessToken({ prompt: 'consent' });
    }
  });

  // Se in passato l'utente si era già collegato, prova un accesso silenzioso
  if(localStorage.getItem('gdrive-was-signed-in') === '1'){
    gTokenClient.requestAccessToken({ prompt: '' });
  }
}

async function driveApiFetch(url, options={}, retried=false){
  const res = await fetch(url, {
    ...options,
    headers: { ...(options.headers||{}), Authorization: `Bearer ${gAccessToken}` },
  });
  if(res.status === 401 && !retried){
    // Il token è scaduto nel mezzo dell'uso: proviamo un rinnovo silenzioso
    // e ripetiamo la richiesta una sola volta, invece di andare in errore.
    try{
      await silentTokenRefresh();
      return driveApiFetch(url, options, true);
    }catch(e){
      throw new Error('Sessione Google scaduta: ricollegati a Drive.');
    }
  }
  if(!res.ok){
    const errText = await res.text().catch(()=> '');
    throw new Error(`Drive API error ${res.status}: ${errText}`);
  }
  return res;
}

async function driveFindFile(){
  const q = encodeURIComponent(`name='${DRIVE_FILENAME}' and trashed=false`);
  const res = await driveApiFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime)&spaces=drive`);
  const data = await res.json();
  return (data.files && data.files[0]) || null;
}

async function driveDownload(fileId){
  const res = await driveApiFetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
  return res.json();
}

async function driveUpload(fileId, content){
  const body = JSON.stringify(content);
  if(fileId){
    await driveApiFetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body,
    });
  } else {
    const boundary = 'ricette_boundary';
    const metadata = { name: DRIVE_FILENAME, mimeType: 'application/json' };
    const multipartBody =
      `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
      `--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
    const res = await driveApiFetch(`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`, {
      method: 'POST',
      headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
      body: multipartBody,
    });
    const data = await res.json();
    gDriveFileId = data.id;
  }
}

async function driveInitialSync(){
  try{
    const file = await driveFindFile();
    if(file){
      gDriveFileId = file.id;
      const remote = await driveDownload(file.id);
      // Il file su Drive è la fonte di verità al primo collegamento
      applyStoredData(remote);
      localStorage.setItem('ricette-list', JSON.stringify({ recipes, shoppingList }));
      render();
      renderShoppingBadge();
    } else {
      // Nessun file remoto: crealo con i dati locali attuali
      await driveUpload(null, { recipes, shoppingList });
    }
    setGdriveStatus('Sincronizzato con Google Drive', 'ok');
  }catch(e){
    console.error(e);
    setGdriveStatus('Errore di sincronizzazione', 'err');
  }
}

function queueDriveSync(){
  if(!gAccessToken) return; // non collegato: solo salvataggio locale
  clearTimeout(driveSyncTimer);
  driveSyncTimer = setTimeout(async ()=>{
    try{
      await driveUpload(gDriveFileId, { recipes, shoppingList });
      setGdriveStatus('Sincronizzato con Google Drive', 'ok');
    }catch(e){
      console.error(e);
      setGdriveStatus('Errore di sincronizzazione', 'err');
    }
  }, 800);
}

function renderChips(){
  const all = [{key:'tutte', label:'Tutte', color:'var(--primary)'}, ...CATS];
  chipsEl.innerHTML = all.map(c => `
    <button class="chip ${activeCat===c.key?'active':''}" data-cat="${c.key}"
      style="${activeCat===c.key ? `background:${c.color};border-color:${c.color};` : ''}">
      ${c.label}
    </button>`).join('');
  chipsEl.querySelectorAll('.chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{ activeCat = btn.dataset.cat; render(); });
  });
}

function highlight(text, term){
  if(!term) return text;
  const norm = normalize(text);
  const idx = norm.indexOf(term);
  if(idx === -1) return text;
  return text.slice(0,idx) + '<mark>' + text.slice(idx, idx+term.length) + '</mark>' + text.slice(idx+term.length);
}

function matchesSearch(r, term){
  if(!term) return true;
  if(normalize(r.name).includes(term)) return true;
  return r.ingredients.some(i => normalize(i).includes(term));
}

function render(){
  renderChips();
  const term = normalize(searchTerm);
  const filtered = recipes
    .filter(r => activeCat==='tutte' || r.category===activeCat)
    .filter(r => matchesSearch(r, term))
    .sort((a,b)=> a.name.localeCompare(b.name, 'it'));

  countBadge.textContent = `${recipes.length} ricett${recipes.length===1?'a':'e'}`;

  if(filtered.length === 0){
    grid.innerHTML = `<div class="empty">
      <h3>${recipes.length===0 ? 'Il tuo ricettario è ancora vuoto' : 'Nessuna ricetta trovata'}</h3>
      <p>${recipes.length===0 ? 'Aggiungi la tua prima ricetta per iniziare a costruire la tua raccolta.' : 'Prova a cambiare categoria o termine di ricerca.'}</p>
      ${recipes.length===0 ? '<button id="emptyAdd">+ Aggiungi ricetta</button>' : ''}
    </div>`;
    const eb = document.getElementById('emptyAdd');
    if(eb) eb.addEventListener('click', ()=> openAddForm());
    return;
  }

  grid.innerHTML = filtered.map(r=>{
    const cat = catMap[r.category];
    const previewIng = r.ingredients.slice(0,3).join(', ') + (r.ingredients.length>3 ? '…' : '');
    return `
    <div class="card-wrap">
      <div class="tab" style="background:${cat.color}">${cat.label}</div>
      <div class="card" data-id="${r.id}">
        ${r.image ? `<img class="card-photo" src="${r.image}" alt="Foto di ${r.name}">` : ''}
        <h3>${highlight(r.name, term)}</h3>
        <div class="meta">
          ${r.time ? `<span>⏱ ${r.time}</span>` : ''}
          ${r.servings ? `<span>${r.servings} porz.</span>` : ''}
        </div>
        ${renderStarsReadonly(r.rating)}
        <div class="ingredients-preview"><b>Ingredienti:</b> ${highlight(previewIng, term)}</div>
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('click', ()=> openDetail(c.dataset.id));
  });
}

document.getElementById('search').addEventListener('input', (e)=>{
  searchTerm = e.target.value;
  render();
});
document.getElementById('btnAdd').addEventListener('click', ()=> openAddForm());
overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });

function buildRecipeText(r){
  const cat = catMap[r.category];
  let text = `${r.name}\n`;
  if(cat) text += `${cat.label}\n`;
  if(r.time || r.servings){
    const meta = [r.time ? `⏱ ${r.time}` : '', r.servings ? `${r.servings} porzioni` : ''].filter(Boolean);
    text += meta.join(' · ') + '\n';
  }
  text += `\nIngredienti:\n` + r.ingredients.map(i=>`- ${i}`).join('\n');
  text += `\n\nPreparazione:\n` + r.steps.map((s,i)=>`${i+1}. ${s}`).join('\n');
  if(r.notes) text += `\n\nNote:\n${r.notes}`;
  return text;
}

async function shareRecipe(r){
  const text = buildRecipeText(r);
  if(navigator.share){
    try{
      await navigator.share({ title: r.name, text });
      return;
    }catch(e){
      if(e.name === 'AbortError') return; // l'utente ha annullato la condivisione
      // altrimenti si passa al fallback qui sotto
    }
  }
  try{
    await navigator.clipboard.writeText(text);
    alert('La ricetta è stata copiata negli appunti: incollala dove vuoi (WhatsApp, email, note...).');
  }catch(e){
    console.error(e);
    alert('Impossibile condividere o copiare automaticamente. Copia manualmente il testo dalla scheda.');
  }
}

function renderShoppingBadge(){
  const badge = document.getElementById('shoppingBadge');
  const pending = shoppingList.filter(i=>!i.checked).length;
  badge.textContent = pending;
  badge.classList.toggle('hidden', pending===0);
}

function shoppingItemsHTML(){
  if(shoppingList.length===0){
    return '<p class="shopping-empty">La lista della spesa è vuota. Aggiungi un elemento oppure importa gli ingredienti di una ricetta.</p>';
  }
  return `<ul class="shopping-list" id="shoppingListEl">${shoppingList.map(item=>`
    <li class="${item.checked?'checked':''}" data-id="${item.id}">
      <input type="checkbox" ${item.checked?'checked':''}>
      <span>${item.text}</span>
      <button class="del-item" title="Rimuovi">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </li>`).join('')}</ul>`;
}

function openShoppingList(){
  modalContent.innerHTML = `
    <button class="modal-close" onclick="closeModal()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <h2>Lista della spesa</h2>
    <div class="shopping-add-row">
      <input id="shopping-new-item" type="text" placeholder="Aggiungi un elemento…" autocomplete="off">
      <button class="btn-primary" id="shoppingAddBtn">Aggiungi</button>
    </div>
    <div class="shopping-from-recipe">
      <select id="shopping-from-recipe-select">
        <option value="">+ Aggiungi ingredienti da una ricetta…</option>
        ${recipes.slice().sort((a,b)=>a.name.localeCompare(b.name,'it')).map(r=>`<option value="${r.id}">${r.name}</option>`).join('')}
      </select>
    </div>
    <div id="shoppingListWrap">${shoppingItemsHTML()}</div>
    <div class="modal-actions">
      <button class="btn-danger" id="shoppingClearChecked">Rimuovi selezionati</button>
      <button class="btn-secondary" id="shoppingClearAll">Svuota tutto</button>
      <button class="btn-secondary" onclick="closeModal()">Chiudi</button>
    </div>
  `;

  const wrap = document.getElementById('shoppingListWrap');

  function refreshList(){
    wrap.innerHTML = shoppingItemsHTML();
    bindItemEvents();
    renderShoppingBadge();
  }

  function bindItemEvents(){
    wrap.querySelectorAll('.shopping-list li').forEach(li=>{
      const id = li.dataset.id;
      li.querySelector('input[type="checkbox"]').addEventListener('change', async (e)=>{
        const item = shoppingList.find(i=>i.id===id);
        if(item){ item.checked = e.target.checked; await saveRecipes(); refreshList(); }
      });
      li.querySelector('.del-item').addEventListener('click', async ()=>{
        shoppingList = shoppingList.filter(i=>i.id!==id);
        await saveRecipes();
        refreshList();
      });
    });
  }
  bindItemEvents();

  document.getElementById('shoppingAddBtn').addEventListener('click', addNewShoppingItem);
  document.getElementById('shopping-new-item').addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){ e.preventDefault(); addNewShoppingItem(); }
  });
  async function addNewShoppingItem(){
    const input = document.getElementById('shopping-new-item');
    const text = input.value.trim();
    if(!text) return;
    shoppingList.push({ id: uid(), text, checked:false });
    input.value = '';
    await saveRecipes();
    refreshList();
  }

  document.getElementById('shopping-from-recipe-select').addEventListener('change', async (e)=>{
    const rid = e.target.value;
    if(!rid) return;
    const recipe = recipes.find(x=>x.id===rid);
    if(recipe){
      recipe.ingredients.forEach(ing=>{
        shoppingList.push({ id: uid(), text: ing, checked:false });
      });
      await saveRecipes();
      refreshList();
    }
    e.target.value = '';
  });

  document.getElementById('shoppingClearChecked').addEventListener('click', async ()=>{
    if(shoppingList.some(i=>i.checked) && confirm('Rimuovere gli elementi selezionati dalla lista?')){
      shoppingList = shoppingList.filter(i=>!i.checked);
      await saveRecipes();
      refreshList();
    }
  });
  document.getElementById('shoppingClearAll').addEventListener('click', async ()=>{
    if(shoppingList.length && confirm('Svuotare completamente la lista della spesa?')){
      shoppingList = [];
      await saveRecipes();
      refreshList();
    }
  });

  overlay.classList.add('open');
}

document.getElementById('btnShopping').addEventListener('click', ()=> openShoppingList());

    if(!file) return;
    if(!file.type.startsWith('image/')){
      alert('Seleziona un file immagine valido.');
      return;
    }
    try{
      selectedImage = await compressImage(file);
      imagePreview.src = selectedImage;
      imagePreview.classList.add('show');
      imageRemoveBtn.classList.add('show');
    }catch(err){
      console.error(err);
      alert('Impossibile elaborare l\'immagine selezionata.');
    }
  });
  imageRemoveBtn.addEventListener('click', ()=>{
    selectedImage = null;
    imagePreview.src = '';
    imagePreview.classList.remove('show');
    imageRemoveBtn.classList.remove('show');
    document.getElementById('f-image').value = '';
  });

  document.getElementById('saveBtn').addEventListener('click', async ()=>{
    const name = document.getElementById('f-name').value.trim();
    if(!name){ alert('Inserisci il nome della ricetta.'); return; }
    const ingredients = document.getElementById('f-ingredients').value.split('\n').map(s=>s.trim()).filter(Boolean);
    const steps = document.getElementById('f-steps').value.split('\n').map(s=>s.trim()).filter(Boolean);
    const newRecipe = {
      id: editingId || uid(),
      name,
      category: selectedCat,
      time: document.getElementById('f-time').value.trim(),
      servings: document.getElementById('f-servings').value.trim(),
      ingredients: ingredients.length ? ingredients : ['-'],
      steps: steps.length ? steps : ['-'],
      notes: document.getElementById('f-notes').value.trim(),
      image: selectedImage,
      rating: r.rating || 0,
    };
    if(editingId){
      recipes = recipes.map(x => x.id===editingId ? newRecipe : x);
    } else {
      recipes.push(newRecipe);
    }
    await saveRecipes();
    closeModal();
    render();
  });

  overlay.classList.add('open');
}

window.closeModal = closeModal;
loadRecipes();
window.addEventListener('load', initGoogleAuth);
</script>
</body>
</html>
